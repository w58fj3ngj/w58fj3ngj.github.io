<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Games</title>
    <link rel="icon" href="textures/icons/logo.png" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/games.css" />
  </head>
  <body>
    <section class="games-section">
      <div class="search-container">
        <div class="textInputWrapper">
          <input
            type="text"
            id="searchInput"
            class="textInput"
            placeholder="Search games"
          />
        </div>
      </div>
      <div class="games-container"></div>
    </section>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const gamesContainer = document.querySelector(".games-container");

        if (typeof games === "undefined" || !Array.isArray(games)) {
          console.error("games-data.js is not loaded properly or 'games' is not an array.");
          return;
        }

        games.forEach(game => {
          const gameButton = document.createElement("div");
          gameButton.classList.add("game-button");
          gameButton.setAttribute("data-url", game.url);
          gameButton.setAttribute("data-name", game.name);

          gameButton.innerHTML = `
            <img src="${game.image}" alt="${game.name}" />
            <p class="game-title">${game.name}</p>
          `;

          gameButton.addEventListener("click", () => {
            const gameUrl = game.url;
            const gameName = game.name;

            window.location.href = `play.html?url=${encodeURIComponent(gameUrl)}&name=${encodeURIComponent(gameName)}`;
          });

          gamesContainer.appendChild(gameButton);
        });
      });
    </script>
    <script src="games-data.js"></script>
  </body>
</html>
