<!DOCTYPE html>
<html lang="en">

<head>
  <link rel="shortcut icon" href="./assets/images/icon.png" type="image/png" />
  <title>Art Class - Search</title>

  <link rel="stylesheet" href="./css/master.css" />
  <script src="uv/uv.bundle.js" charset="UTF-8"></script>
  <script src="uv/uv.config.js"></script>

  <script id="aclib" type="text/javascript" src="//acscdn.com/script/aclib.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #111;
      color: #fff;
      margin: 0;
      padding: 0;
    }

    h1 {
      text-align: center;
      margin-top: 20px;
      color: #ff69b4;
    }

    .center-container {
      text-align: center;
      padding: 30px;
    }

    .pxyinput {
      background-color: #222;
      color: #fff;
      border: 2px solid #ff69b4;
      padding: 10px;
      width: 50%;
      font-size: 18px;
      border-radius: 5px;
      outline: none;
    }

    .pxyinput:focus {
      border-color: #ff1493;
    }

    .frame {
      width: 100%;
      height: 600px;
      border: none;
      display: none;
      margin-top: 20px;
    }

    nav {
      background-color: #333;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo h1 {
      font-size: 24px;
      color: #ff69b4;
      margin-left: 10px;
    }

    .navitems {
      display: flex;
    }

    .navitem {
      margin-left: 20px;
    }

    .navitem a {
      color: #fff;
      text-decoration: none;
      font-size: 18px;
    }

    .navitem a:hover {
      color: #ff69b4;
    }
  </style>
</head>

<body theme="main">
  <nav>
    <div class="logo">
      <img src="./assets/images/icon.png" alt="Logo" draggable="false" />
      <h1>Art Class</h1>
    </div>

    <p id="time"></p>

    <div class="navitems">
      <div class="navitem"><a href="/index.html">Home</a></div>
      <div class="navitem"><a href="/gs.html">Games</a></div>
      <div class="navitem"><a href="/apps.html">Apps</a></div>
      <div class="navitem"><a href="/emulator.html">Emulator</a></div>
      <div class="navitem"><a href="/search.html" selected>Search</a></div>
    </div>
  </nav>

  <div class="center-container">
    <h1>Search</h1>
    <input class="pxyinput" type="text" placeholder="Search..." id="searchInput" />
  </div>
  <iframe class="frame" id="resultFrame"></iframe>

  <script>
    const frame = document.querySelector("iframe");
    const div = document.querySelector(".center-container");
    frame.style.display = "none";
    const input = document.querySelector("#searchInput");

    input.addEventListener("keyup", function (event) {
      if (event.key === "Enter") {
        div.style.display = 'none';
        frame.style.display = 'block';
        const searchUrl = __uv$config.prefix + __uv$config.encodeUrl(search(input.value));
        console.log("Iframe URL:", searchUrl); // Log the URL being set to iframe
        document.querySelector("iframe").src = searchUrl;
      }
    });

    var params = new URLSearchParams(window.location.search);
    if (params.get("q")) {
      div.style.display = 'none';
      frame.style.display = 'block';
      const searchUrl = __uv$config.prefix + __uv$config.encodeUrl(search(params.get("q")));
      console.log("Iframe URL from query param:", searchUrl); // Log the URL from query
      document.querySelector("iframe").src = searchUrl;
    }

    function search(input) {
      console.log('Input:', input); // Log the input to check its type

      try {
        // Check if it's a valid URL:
        return new URL(input).toString();
      } catch (err) {
        console.log('Invalid URL:', input);
      }

      try {
        // Check if it's a valid URL when "http://" is added:
        const url = new URL(`http://${input}`);
        if (url.hostname.includes(".")) return url.toString();
      } catch (err) {
        console.log('Still invalid:', input);
      }

      // Treat as Google search if it's neither a valid URL
      return `https://www.google.com/search?q=${encodeURIComponent(input)}`;
    }
  </script>

  <script type="text/javascript">
    aclib.runAutoTag({
      zoneId: '6hmeyutild',
    });
  </script>
</body>

</html>
