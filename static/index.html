<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Search the John</title>
  <script src="uv/uv.bundle.js" defer=""></script>
  <script src="uv/uv.config.js" defer=""></script>
  <script src="register-sw.js" defer=""></script>
  <script src="search.js" defer=""></script>
  <script src="index.js" defer=""></script>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #121212;
      color: #ccc;
      text-align: center;
      margin: 0;
      padding: 30px 0px;
      overflow: hidden;
      box-sizing: border-box;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 20px;
      color: #f1f1f1;
    }

    #uv-address {
      width: 50%;
      padding: 10px;
      font-size: 16px;
      border: 2px solid #444;
      border-radius: 20px;
      background-color: #222;
      color: #ccc;
      box-shadow: none;
      outline: none;
      transition: all 0.3s ease-in-out;
    }

    #uv-address:focus {
      border-color: #555;
    }

    #uv-address::placeholder {
      color: #888;
    }

    #suggestions {
      list-style: none;
      padding: 0;
      margin-top: 5px;
      width: 50%;
      margin-left: auto;
      margin-right: auto;
      text-align: left;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.5s ease-out, opacity 0.5s ease;
      opacity: 0;
    }

    #suggestions li {
      background: #222;
      padding: 8px 15px;
      border: 2px solid #555;
      border-radius: 10px;
      margin-top: 5px;
      cursor: pointer;
      transition: background 0.2s ease;
      color: #ccc;
    }

    #suggestions li:hover {
      background-color: #333;
    }

    hr {
      border: none;
      border-top: 1px solid #555;
      margin-top: 30px;
      width: 40%;
      margin-left: auto;
      margin-right: auto;
    }
  </style>
</head>
<body>
  <h1>ultraviolet proxy</h1>
  <form id="uv-form">
    <input id="uv-search-engine" value="https://duckduckgo.com/?q=%s" type="hidden" />
    <input id="uv-address" type="text" placeholder="Search DuckDuckGo or type a URL." autocomplete="off" />
    <ul id="suggestions"></ul>
  </form>
  <hr />

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const input = document.getElementById('uv-address');
      const suggestions = document.getElementById('suggestions');
      const form = document.getElementById('uv-form');
      let controller = null;
      let timeout = null;

      input.addEventListener('input', async () => {
        const query = input.value.trim();

        clearTimeout(timeout);

        if (!query) {
          suggestions.style.maxHeight = '0';
          suggestions.style.opacity = '0';
        }

        timeout = setTimeout(async () => {
          if (!query) {
            suggestions.style.maxHeight = '0';
            suggestions.style.opacity = '0';
            return;
          }

          if (controller) controller.abort();
          controller = new AbortController();

          try {
            const res = await fetch(`https://corsproxy.io/?https://suggestqueries.google.com/complete/search?client=firefox&q=${encodeURIComponent(query)}`, {
              signal: controller.signal
            });

            const data = await res.json();
            const terms = data[1];

            suggestions.innerHTML = '';
            const limitedTerms = terms.slice(0, 8);

            limitedTerms.forEach(term => {
              const li = document.createElement('li');
              li.textContent = term;
              li.addEventListener('click', () => {
                input.value = term;
                form.submit();
              });
              suggestions.appendChild(li);
            });

            suggestions.style.maxHeight = `${limitedTerms.length * 50}px`;
            suggestions.style.opacity = '1';

          } catch (err) {
            if (err.name !== 'AbortError') console.error('Suggestion fetch error:', err);
          }
        }, 100);
      });
    });
  </script>
</body>
</html>
